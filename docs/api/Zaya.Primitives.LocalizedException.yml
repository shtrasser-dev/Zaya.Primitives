  assemblies:
  - Zaya.Primitives
  namespace: Zaya.Primitives
  summary: >-
    Returns the user-facing localized message for the specified culture.

    The base implementation returns the key as a fallback.

    Override to resolve via a resource manager.
  example: []
  syntax:
    content: public virtual string GetLocalizedMessage(CultureInfo culture)
    parameters:
    - id: culture
      type: System.Globalization.CultureInfo
      description: The target culture for localization.
    return:
      type: System.String
      description: The localized error message.
    content.vb: Public Overridable Function GetLocalizedMessage(culture As CultureInfo) As String
