  assemblies:
  - Zaya.Primitives
  namespace: Zaya.Primitives
  summary: >-
    Binds the user-provided settings values to this list.

    After calling this method, the typed getters read from the provided dictionary and fall back

    to the descriptors' default values when a key is missing or cannot be parsed.
  example: []
  syntax:
    content: public void Bind(IReadOnlyDictionary<string, object> values)
    parameters:
    - id: values
      type: System.Collections.Generic.IReadOnlyDictionary{System.String,System.Object}
      description: User-provided settings (keyed by the same keys as the descriptors).
