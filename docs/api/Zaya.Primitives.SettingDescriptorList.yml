  assemblies:
  - Zaya.Primitives
  namespace: Zaya.Primitives
  summary: >-
    Gets the string value for the specified setting key.

    If the key is not present in the bound dictionary, returns the descriptor's <xref href="Zaya.Primitives.StringSettingDescriptor.DefaultValue" data-throw-if-not-resolved="false"></xref>.

    Handles all string-based descriptor types: <xref href="Zaya.Primitives.StringSettingDescriptor" data-throw-if-not-resolved="false"></xref>,

    <xref href="Zaya.Primitives.FilePathSettingDescriptor" data-throw-if-not-resolved="false"></xref>, <xref href="Zaya.Primitives.DirectoryPathSettingDescriptor" data-throw-if-not-resolved="false"></xref>,

    <xref href="Zaya.Primitives.UrlSettingDescriptor" data-throw-if-not-resolved="false"></xref>, <xref href="Zaya.Primitives.PasswordSettingDescriptor" data-throw-if-not-resolved="false"></xref>, and <xref href="Zaya.Primitives.EnumSettingDescriptor" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: public string GetValueAsString(string key)
    parameters:
    - id: key
      type: System.String
      description: The setting key.
    return:
      type: System.String
      description: The string value, or default fallback (<code>""</code>).
    content.vb: Public Function GetValueAsString(key As String) As String
  overload: Zaya.Primitives.SettingDescriptorList.GetValueAsString*
  nameWithType.vb: SettingDescriptorList.GetValueAsString(String)
  fullName.vb: Zaya.Primitives.SettingDescriptorList.GetValueAsString(String)
  name.vb: GetValueAsString(String)
