  assemblies:
  - Zaya.Primitives
  namespace: Zaya.Primitives
  summary: >-
    Wraps a collection of <xref href="Zaya.Primitives.SettingDescriptor" data-throw-if-not-resolved="false"></xref> and provides typed getters

    (<xref href="Zaya.Primitives.SettingDescriptorList.GetValueAsString(System.String)" data-throw-if-not-resolved="false"></xref>, <xref href="Zaya.Primitives.SettingDescriptorList.GetValueAsInt(System.String)" data-throw-if-not-resolved="false"></xref>, <xref href="Zaya.Primitives.SettingDescriptorList.GetValueAsBool(System.String)" data-throw-if-not-resolved="false"></xref>)

    that read from a bound user-provided dictionary and fall back to the descriptors' default values.

    Plugins declare descriptors once, the host renders the UI, and the plugin consumes the values

    without manual parsing or default-value handling.
