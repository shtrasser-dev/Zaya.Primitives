  namespace: Zaya.Primitives
  summary: >-
    Provides a static list of common languages as <xref href="Zaya.Primitives.EnumOption" data-throw-if-not-resolved="false"></xref> values.

    OCR, translation, and other engines reference <xref href="Zaya.Primitives.Languages.All" data-throw-if-not-resolved="false"></xref> in their

    <xref href="Zaya.Primitives.EnumSettingDescriptor.Options" data-throw-if-not-resolved="false"></xref> to present a language dropdown in the host UI.

    Each option's <xref href="Zaya.Primitives.EnumOption.Value" data-throw-if-not-resolved="false"></xref> is a BCP-47 tag (e.g. "ru", "zh-Hans").
