  namespace: Zaya.Primitives
  summary: >-
    Represents a string that can be localized. Supports two modes:


    <ul><li>Localized via a resolver function (typically a .resx <code>ResourceManager</code>).</li><li>Invariant — created via <xref href="Zaya.Primitives.LocalizedString.Invariant(System.String)" data-throw-if-not-resolved="false"></xref> and never translated.</li></ul>


    All source strings live in resource files; no English defaults are embedded in code.
