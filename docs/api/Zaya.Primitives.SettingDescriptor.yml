    id: IsRequired
    path: src/Zaya.Primitives/SettingDescriptor.cs
    startLine: 52
  assemblies:
  - Zaya.Primitives
  namespace: Zaya.Primitives
  summary: >-
    Gets or sets a predicate that determines whether this setting must be filled

    before the engine can be initialized, based on the current values of all settings.

    Defaults to not required.
  remarks: >-
    Same contract as <xref href="Zaya.Primitives.SettingDescriptor.IsVisible" data-throw-if-not-resolved="false"></xref>: the host passes current values (keys may be

    absent), and re-evaluates on every change. Hosts evaluate this predicate only for

    settings whose <xref href="Zaya.Primitives.SettingDescriptor.IsVisible" data-throw-if-not-resolved="false"></xref> returned <code>true</code>.

    Example: <code>IsRequired = s =&gt; s.GetValueOrDefault("source") as string == "directory"</code>;

    unconditional: <code>IsRequired = static _ =&gt; true</code>.
  example: []
  syntax:
    content: public Func<IReadOnlyDictionary<string, object?>, bool> IsRequired { get; init; }
    parameters: []
    return:
      type: System.Func{System.Collections.Generic.IReadOnlyDictionary{System.String,System.Object},System.Boolean}
    content.vb: Public Property IsRequired As Func(Of IReadOnlyDictionary(Of String, Object), Boolean)
  overload: Zaya.Primitives.SettingDescriptor.IsRequired*
