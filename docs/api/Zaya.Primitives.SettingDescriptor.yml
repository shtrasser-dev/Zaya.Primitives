- uid: Zaya.Primitives.SettingDescriptor.IsVisible
  commentId: P:Zaya.Primitives.SettingDescriptor.IsVisible
  id: IsVisible
  parent: Zaya.Primitives.SettingDescriptor
  langs:
  - csharp
  - vb
  name: IsVisible
  nameWithType: SettingDescriptor.IsVisible
  fullName: Zaya.Primitives.SettingDescriptor.IsVisible
  type: Property
  source:
    remote:
      path: src/Zaya.Primitives/SettingDescriptor.cs
      branch: main
      repo: https://github.com/shtrasser-dev/Zaya.Primitives
    id: IsVisible
    path: src/Zaya.Primitives/SettingDescriptor.cs
    startLine: 38
  assemblies:
  - Zaya.Primitives
  namespace: Zaya.Primitives
  summary: >-
    Gets or sets a predicate that determines whether this setting is currently relevant,

    based on the current values of all settings (keyed by <xref href="Zaya.Primitives.SettingDescriptor.Key" data-throw-if-not-resolved="false"></xref>).

    Defaults to always visible.
  remarks: >-
    The host invokes the predicate with the dictionary of current setting values; keys may

    be absent when a setting has not been set — the predicate should fall back to the

    default value. Hosts should re-evaluate the predicate whenever any setting value changes,

    hide the field when it returns <code>false</code>, and skip <xref href="Zaya.Primitives.SettingDescriptor.IsRequired" data-throw-if-not-resolved="false"></xref> validation

    for hidden settings.

    Example: <code>IsVisible = s =&gt; s.GetValueOrDefault("source") as string == "url"</code>.
  example: []
  syntax:
    content: public Func<IReadOnlyDictionary<string, object?>, bool> IsVisible { get; init; }
    parameters: []
    return:
      type: System.Func{System.Collections.Generic.IReadOnlyDictionary{System.String,System.Object},System.Boolean}
    content.vb: Public Property IsVisible As Func(Of IReadOnlyDictionary(Of String, Object), Boolean)
  overload: Zaya.Primitives.SettingDescriptor.IsVisible*
